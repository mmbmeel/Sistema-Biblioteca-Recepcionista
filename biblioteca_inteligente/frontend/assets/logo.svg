<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <!-- Ícone de livro aberto -->
  <rect x="4" y="8" width="26" height="34" rx="3" fill="#43196D"/>
  <rect x="30" y="8" width="26" height="34" rx="3" fill="#D1006C"/>
  <rect x="28" y="6" width="4" height="38" rx="2" fill="#F36D7D"/>
  <!-- Linhas de texto no livro -->
  <line x1="9"  y1="17" x2="25" y2="17" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9"  y1="22" x2="25" y2="22" stroke="rgba(255,255,255,0.3)" stroke-width="1"   stroke-linecap="round"/>
  <line x1="9"  y1="27" x2="22" y2="27" stroke="rgba(255,255,255,0.3)" stroke-width="1"   stroke-linecap="round"/>
  <line x1="35" y1="17" x2="51" y2="17" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35" y1="22" x2="51" y2="22" stroke="rgba(255,255,255,0.3)" stroke-width="1"   stroke-linecap="round"/>
  <line x1="35" y1="27" x2="48" y2="27" stroke="rgba(255,255,255,0.3)" stroke-width="1"   stroke-linecap="round"/>
  <!-- Texto principal -->
  <text x="66" y="30" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#F5F5F5" letter-spacing="-0.5">Biblioteca</text>
  <!-- Linha separadora decorativa -->
  <rect x="66" y="34" width="200" height="1" fill="url(#logoGrad)" rx="1"/>
  <!-- Subtítulo -->
  <text x="66" y="48" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="500" fill="#F36D7D" letter-spacing="1.5">GESTÃO INTELIGENTE</text>
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#D1006C"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>
